spring:
    jpa:
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    cloud:
      config:
        enabled: false
    application:
      name: smartbusreservation
server:
  port: 8081
springdoc:
  swagger-ui:
    path: /swagger-ui-index.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/