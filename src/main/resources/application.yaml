spring:
  application:
    name: smartbusreservation

  datasource:
    url: jdbc:mysql://localhost:3306/smartbus?createDatabaseIfNotExist=true
    username: root
    password: JavaDB
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

  cloud:
    config:
      enabled: false

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui-index.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/